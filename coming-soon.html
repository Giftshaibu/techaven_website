<!doctype html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <meta name="description" content="TECHAVEN is launching soon. Stay tuned for a smarter way to shop electronics." />
  <title>TECHAVEN — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="icon" type="image/png" href="img/favicontechaveb.png" />
  <link rel="icon" type="image/png" href="img/favicontechaveb.png" />
</head>

<body class="coming-soon-body">
  <main class="coming-soon-page">
    <!-- Full-viewport coming-soon content -->
    <section class="coming-soon-section">
      <div class="">
        <!-- Logo (always visible) -->
        <a href="index.html">
          <img class="element" src="img/17547262965421.png" alt="TECHAVEN Logo" width="200px" />
        </a>
      </div>
      <h2 class="big_text"><span class="text-wrapper-7">TECHAVEN</span> is launching a smarter <br>way to shop
        electronics.</h2>
      <div class="buttons">
        <div class="left_button" type="button">
          <a href="index.html">coming soon</a>
        </div>
        <button class="right_button waitlist-trigger" type="button" id="joinWaitlistButton">
          Join the waitlist
        </button>
      </div>

      <div class="waitlist-panel" id="waitlistPanel" aria-hidden="true">
        <form class="waitlist-form" id="waitlistForm" autocomplete="on">
          <label class="visually-hidden" for="waitlistName">Your name</label>
          <input class="waitlist-input" id="waitlistName" name="name" type="text" placeholder="Your name here"
            autocomplete="name" required />
          <label class="visually-hidden" for="waitlistEmail">Email address</label>
          <input class="waitlist-input" id="waitlistEmail" name="email" type="email" placeholder="Email address"
            autocomplete="email" required />
          <button class="waitlist-submit" type="submit">
            Join <span aria-hidden="true"><i class="bi bi-arrow-right"></i></span>
          </button>
        </form>
        <div class="waitlist-success" id="waitlistSuccess" aria-live="polite" aria-hidden="true">
          <p>Thank you for joining, you will receive a confirmation email.</p>
          <a class="waitlist-home" href="index.html">Back to home <span aria-hidden="true"><i class="bi bi-arrow-right"></i></span></a>
        </div>
      </div>

      <!-- desktop graphic only on large screens (pinned to bottom via CSS) -->
      <div class="Desktop_image d-none d-lg-block">
        <img src="img/comingsoonimg1.png" alt="Coming Soon Image" w/>
      </div>

      <!-- mobile graphic: centered -->
      <div class="mobile_image d-block d-lg-none">
        <div class="phoneimage-wrap" aria-label="App screenshots gallery">
          <button class="phoneimage-nav phoneimage-prev" type="button" aria-label="Previous image">
            <i class="bi bi-chevron-left"></i>
          </button>
          <div class="phoneimage">
            <button class="phoneimage-item" type="button" data-full="img/phoneimage1@4x.png"
              aria-label="View full image: Mobile app interface preview 1">
              <img src="img/phoneimage1@4x.png" alt="Mobile app interface preview 1" />
              <span class="phoneimage-zoom" aria-hidden="true"><i class="bi bi-zoom-in"></i></span>
            </button>
            <button class="phoneimage-item" type="button" data-full="img/phoneimage@4x.png"
              aria-label="View full image: Mobile app interface preview 2">
              <img src="img/phoneimage@4x.png" alt="Mobile app interface preview 2" />
              <span class="phoneimage-zoom" aria-hidden="true"><i class="bi bi-zoom-in"></i></span>
            </button>
            <button class="phoneimage-item" type="button" data-full="img/phoneimage2@4x.png"
              aria-label="View full image: Mobile app interface preview 3">
              <img src="img/phoneimage2@4x.png" alt="Mobile app interface preview 3" />
              <span class="phoneimage-zoom" aria-hidden="true"><i class="bi bi-zoom-in"></i></span>
            </button>
            <button class="phoneimage-item" type="button" data-full="img/phoneimage3@4x.png"
              aria-label="View full image: Mobile app interface preview 4">
              <img src="img/phoneimage3@4x.png" alt="Mobile app interface preview 4" />
              <span class="phoneimage-zoom" aria-hidden="true"><i class="bi bi-zoom-in"></i></span>
            </button>
          </div>
          <div class="phoneimage-dots" aria-hidden="true"></div>
          <button class="phoneimage-nav phoneimage-next" type="button" aria-label="Next image">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
        <div class="image-lightbox" id="phoneimageLightbox" aria-hidden="true" role="dialog" aria-modal="true">
          <button class="image-lightbox-close" type="button" aria-label="Close image">
            <i class="bi bi-x-lg"></i>
          </button>
          <button class="image-lightbox-nav image-lightbox-prev" type="button" aria-label="Previous image">
            <i class="bi bi-chevron-left"></i>
          </button>
          <button class="image-lightbox-nav image-lightbox-next" type="button" aria-label="Next image">
            <i class="bi bi-chevron-right"></i>
          </button>
          <img class="image-lightbox-img" src="" alt="" />
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="cs-footer">
      <p>&copy; 2026 TECHAVEN. All rights reserved.</p>
    </footer>
  </main>
</body>

</html>
